- title: Research Experience
  type: time_table
  contents:
    - title: Robust DOA Estimation with Time Modulated Antenna Arrays
      institution: Northwestern Polytechnical University
      year: 2021.09 - Present
      description:
        - Master's Thesis Project, supervised by Ling Wang and Yuexian Wang
        - "Brief Introduction: This ongoing research addresses common issues in current time-modulated antenna array (TMAA) systems for DOA estimation, including colored noise, high computational complexity, and sampling synchronization errors. By developing improved algorithms, we aim to respond to these challenges and enhance estimation accuracy in practical applications."
        - title: Contributions
          contents:
            - Analyzed Theoretical Framework
            - Developed Novel Method
            - Conducted Numerical Simulations
            - Optimized parameters for peak performance
            - Led Manuscript Writing
            - Addressed Reviewers' Feedback
        - title: Impact and Outcomes
          contents:
            - Published research paper
            - Ongoing patent application in progress

    - title: Advancements in Channel Estimation for Massive MIMO Systems
      institution: Northwestern Polytechnical University
      year: 2022.12 - Present
      description:
        - Lead Researcher, collaborated with Neeraj Kumar & Joel Rodrigues
        - "Brief Introduction: Our study aims to advance channel estimation for massive MIMO systems in IoT applications. We propose a parameterized multipath channel estimation method, in the presence of array gain-phase perturbation. Our method demonstrates superior accuracy, promising improved signal transmission efficiency and reliability."
        - title: Contributions
          contents:
            - Analyzed Theoretical Framework
            - Developed Novel Method
            - Conducted Numerical Simulations
            - Led Manuscript Writing
        - title: Impact and Outcomes
          contents:
            - Manuscript submitted and currently under review
            - Ongoing patent application in progress

    - title: Robust Sparse Direct Localization of Smart Vehicles
      institution: Northwestern Polytechnical University
      year: 2022.05 - 2023.07
      description:
        - Project Coordinator, collaborated with Mohammad Obaidat & Joel Rodrigues
        - "Brief Introduction: Introducing an auxiliary vehicle positioning system with time-modulated antenna arrays, our research enhances localization accuracy in occluded scenes. Leveraging multiple auxiliary sources and employing Doppler shifts in received signals, we achieve superior direct vehicle localization accuracy, outperforming existing methods."
        - title: Contributions
          contents:
            - Conducted Numerical Simulations
            - Optimized parameters for peak performance
            - Led Manuscript Writing
            - Addressed Reviewers' Feedback
        - title: Impact and Outcomes
          contents:
            - Published research paper

    - title: Robust Adaptive Beamforming with Array Self-Calibration
      institution: Northwestern Polytechnical University
      year: 2021.01 - 2021.06
      description:
        - Undergraduate Thesis Project, supervised by Yuexian Wang
        - "Brief Introduction: Addressing mutual coupling effects in antenna arrays, we applied interference-plus-noise covariance matrix reconstruction to achieve robust beamforming. This approach accommodates angle-independent and angle-dependent scenarios respectively, ensuring enhanced performance under mutual coupling mismatch."
        - title: Contributions
          contents:
            - Analyzed Theoretical Framework
            - Conducted Numerical Simulations
            - Led Manuscript Writing

